      Привет! Как вам гайд? Удалось разобраться с покупками?

      Знаете, что чаще всего говорят беременные девушки? — "Я тревожусь от того, что не понимаю, что происходит с моим телом"
      — "А вдруг я что-то упущу и наврежу малышу?"
      — "Столько противоречивой информации — кому верить?"

      Если узнали себя — вы не одна. Именно поэтому я создала [курс](https://osoznannoematerinstvo.tilda.ws/?utm_source=bot&utm_medium=voronka1&utm_campaign=kurs&utm_content=day1), где мы разбираем всё по полочкам: от гормонального процесса до первого месяца с малышом.

      Сегодня поделюсь парой советов, но сначала — небольшой опрос. Что волнует тебя больше?
    timeout_seconds: 60

  kk20:
    id: kk20
    text: |-
      Давай проверим, насколько хорошо вы знаете, что стоит и не стоит делать во время беременности?

      Посмотрите варианты ответов и найдите правильные. Когда будете готовы напишите боту цифры ошибочных ответов, чтобы узнать свой результат!

      1. После 25 недель беременности не рекомендуется спать на спине, так как это может привести к пережатию нижней полой вены.

      2. Во время беременности можно продолжать работать ровно столько, сколько сама женщина считает для себя комфортным, а также заниматься йогой и плаванием в бассейне.

      3. Будущей маме разрешается заниматься рукоделием, покупать вещи для ребенка до родов и делать все, что приносит ей радость и удовольствие.

      4. Для поддержания физической формы беременной женщине разрешается заниматься экстремальными видами спорта, такими как катание на лыжах или верховая езда, при хорошем самочувствии.

      5. Чтобы младенец получал достаточно питательных веществ, беременной необходимо кушать за двоих и постоянно носить поддерживающий бандаж в течение всего дня.
    input_handler: kk20_answer
    correct: kk25
    incorrect: kk26
    timeout_seconds: 60
    timeout_target: kk27


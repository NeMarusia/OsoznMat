  kk10:
    id: kk10
    text: |-
      Токсикоз — это серьезное испытание, и совершенно нормально чувствовать себя уставшей и раздраженной. Но с этим можно справиться, если немного изменить привычки. Давайте разберем несколько простых и рабочих правил, которые реально облегчают состояние.

      Утро начинаем не с резких движений. Проснувшись, не вскакивайте с постели. Подложите под спину подушку, полежите несколько минут. Съешьте что-то легкое прямо в кровати: пару ложек творога или вареное яйцо. А рядом с кроватью всегда держите перекус — яблоко, банан, орехи или сухофрукты. Это нужно, чтобы не вставать на голодный желудок. Завтрак все равно будет позже, но этот маленький шаг спасет от утренней тошноты.

      Забудьте про большие перерывы в еде. Голодать категорически нельзя, перерывы не должны превышать 3-4 часов. Ешьте часто, 5-6 раз в день, маленькими порциями. Еда должна быть теплой, не слишком горячей и не ледяной. Жирное, жареное, острое и шоколад пока лучше отложить в сторону. Чипсы и сухарики в качестве перекуса тоже не подойдут — в них нет ничего полезного, а желудку станет только тяжелее.

      И про воду. Пейте около 8-12 чашек в день, но маленькими глотками и между приемами пищи. От крепкого кофе и газировки лучше отказаться в пользу воды, некрепкого чая или морсов. Важный нюанс: холодные напитки замедляют пищеварение и могут спровоцировать тошноту, так что пейте жидкость комнатной температуры.

      Усталость только усиливает симптомы. Спите не меньше 8 часов в проветриваемой комнате. За пару часов до сна уберите телефон и выключите яркий свет — экраны сильно бьют по качеству сна, а вам нужно полноценно восстанавливаться.

      И еще про запахи. Сейчас обоняние работает на максимуме. Если от запаха любимых духов, бытовой химии или пышных букетов теперь воротит нос — не геройствуйте, просто уберите раздражители.

      Выбирайте косметику и бытовые средства без отдушек.
      Движение — это жизнь, даже если не очень хочется. Прогулки в парке, бассейн или легкая зарядка реально снижают проявления токсикоза. Старайтесь бывать на свежем воздухе хотя бы час-два в день.

      И, пожалуйста, берегите нервы. Стресс и тревога только подливают масла в огонь. Если чувствуете, что не справляетесь с эмоциями, не стесняйтесь обратиться к специалисту. А из народных средств хорошо работает вода с лимоном или имбирный чай — имбирь отлично успокаивает желудок.

      Берегите себя. Это состояние временное, и вы обязательно с ним справитесь.
    next: kk18

  kk11:
    id: kk11
    text: |-
      Бессонница во время беременности — это знакомо очень многим. Организм перестраивается, мысли заняты будущим, а найти удобную позу становится целым квестом. Но наладить сон вполне реально, если подойти к вопросу с заботой о себе. Давайте разберем, что действительно работает.

      Начнем с базы — с кровати. Одна из самых популярных поз - на левом боку с подушкой под животом и между колен. Специальные подушки для беременных творят чудеса, так что если у вас такой нет, самое время ее раздобыть. Матрас и одеяло тоже должны быть удобными.

      В спальне нужно создать правильный микроклимат. Проветривайте комнату перед сном, держите температуру в районе 18-20 градусов. Если воздух сухой, поможет увлажнитель. Питание тоже влияет на сон. За 2-3 часа до сна поужинайте чем-то легким. Жирное, острое и кофеин вечером под запретом — они только разыграют нервную систему.

      Физическая активность обязательна, но без фанатизма. Прогулки, плавание, йога или простая растяжка перед сном отлично готовят тело к отдыху. А теплая ванна для ног или легкий массаж поясницы помогут расслабиться.

      Голова часто не дает уснуть. Тревожные мысли лучше всего работают, если их выплеснуть. Попробуйте вести дневник эмоций или просто обсудите переживания с близкими. Медитация и расслабляющая музыка тоже хорошо снимают стресс.

      Гаджеты — враги сна. Отложите телефон минимум за час до сна. Синий свет экранов сбивает все настройки организма. Вместо листания ленты послушайте аудиосказку или белый шум. Если проснулись среди ночи, не смотрите на часы и не хватайтесь за телефон. Это только усилит тревогу. Просто примените дыхательные практики. И важный момент: если бессонница совсем изматывает, не назначайте себе снотворные сами. Многие препараты могут навредить развитию плода. Только врач может оценить сроки, причины и подобрать безопасное средство.

      Есть несколько простых приемов, которые помогают обмануть бессонницу. Создайте свой вечерний ритуал. Теплый душ, приглушенный свет, спокойная музыка — это сигнал мозгу, что пора отключаться. Попробуйте дыхание по счету 4-7-8. Вдох на 4 секунды, задержка на 7 и медленный выдох на 8. Это отлично замедляет сердечный ритм. Правило 20 минут: если не можете уснуть и ворочаетесь, не мучайте себя. Встаньте, послушайте тихую музыку или подышите, пока сон не вернется.

      Используйте технику позитивной визуализации. Представьте место, где вам максимально спокойно и безопасно. И оставьте тусклый ночник. Яркий свет, если вы встанете ночью, окончательно разбудит мозг, а мягкий свет сохранит биоритмы.

      Режим имеет значение. Старайтесь ложиться и вставать в одно и то же время, даже в выходные.

      Беременность — это время, когда нужно быть максимально бережной к себе. Пробуйте разные методы, ищите то, что подходит именно вам, и помните, что отдых вам сейчас необходим как никогда.

      Вы молодец и ответили абсолютно верно. Видно, что вы уже хорошо подготовлены и крайне ответственно относитесь к родам. Если вы хотите подготовиться еще лучше вам может помочь мой [курс](https://osoznannoematerinstvo.tilda.ws/?utm_source=bot&utm_medium=voronka1&utm_campaign=kurs&utm_content=day2) по подготовке к родам. А ниже мы разбираем каждый из вариантов ответов подробнее.

      Утверждение 1. Верно. Разбор: Начиная с 25 недели матка становится достаточно тяжелой. Если лечь на спину, она пережимает нижнюю полую вену, что может вызвать головокружение и ухудшить кровоток. Так что спим на боку и обеспечиваем себе комфортный отдых.

      Утверждение 2. Верно. Разбор: Беременность это не повод отказываться от привычной жизни. Бассейн и йога отлично помогают держать тело в тонусе, снимать напряжение в спине и просто получать удовольствие от движения. А вопрос с работой каждая женщина решает сама, ориентируясь исключительно на свои ощущения.

      Утверждение 3. Верно. Разбор: Период гнездования это прекрасное время. Вязать, шить, выбирать красивые вещи для ребенка и делать подарки своими руками не только можно, но и нужно. Главное правило этого периода делать то, что приносит радость и спокойствие.

      Утверждение 4. Ошибочно. Разбор: Экстремальные виды спорта, такие как лыжи, велосипед, туризм и верховая езда, находятся в строгом запрете. Риск падений и травм здесь слишком велик, даже если самочувствие кажется идеальным. Для поддержания формы лучше выбрать спокойную ходьбу или плавание.

      Утверждение 5. Ошибочно. Разбор: Старый миф о питании за двоих давно пора оставить в прошлом. Избыток калорий не пойдет на пользу ни женщине, ни ребенку, есть нужно качественно и разнообразно. То же самое касается бандажа. Его носят только по показаниям и рекомендациям врача. Если носить его постоянно без необходимости, мышцы спины и живота могут просто отвыкнуть работать самостоятельно.
